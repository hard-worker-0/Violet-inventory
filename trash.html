<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trash Bin - Violet Chemistry</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">Violet Chemistry</div>
            <div class="nav-links">

                <a href="products.html">📦 Product List</a>
                <a href="add.html">➕ Add Product</a>
                <a href="sell.html" class="btn-sell" style="border-radius: 4px; padding: 5px 12px; text-decoration: none; margin-left: 5px; font-weight: 600; font-size: 0.9em;">💰 Sell</a>

                <a href="trash.html">🗑️ Trash</a>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Deleted On</th><th>Actions</th></tr>
                </thead>
                <tbody id="trashTableBody"></tbody>
            </table>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script src="config.js"></script>
