<!DOCTYPE html><html lang="en"><head><title>Add/Edit Product - Violet Chemistry</title><link rel="stylesheet" href="css/styles.css"></head><body>
<nav class="navbar"><div class="nav-container"><div class="nav-brand">Violet Chemistry</div><div class="nav-links"><a href="index.html">📊 Dashboard</a><a href="products.html">📦 Product List</a><a href="add.html">➕ Add Product</a><a href="sell.html" class="btn-sell" style="border-radius: 4px; padding: 5px 12px; text-decoration: none; margin-left: 5px; font-weight: 600; font-size: 0.9em;">💰 Sell</a><a href="history.html">📜 History</a><a href="trash.html">🗑️ Trash</a></div><button class="btn btn-outline" onclick="logout()" style="border-color: var(--danger); color: var(--danger);">🔓 Logout</button></div></nav>
<main class="container">        <div class="form-card">
            <h2 id="pageTitle">Add New Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" required placeholder="Enter product name...">
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label for="quantity">Quantity</label>
                        <input type="number" step="0.01" id="quantity" required placeholder="0.00">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="unit">Unit</label>
                        <select id="unit">
                            <option value="kg">Kilograms (kg)</option>
                            <option value="L">Liters (L)</option>
                            <option value="pcs">Pieces (pcs)</option>
                            <option value="m">Meters (m)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="price">Price (per unit in ৳)</label>
                    <input type="number" step="0.01" id="price" required placeholder="0.00">
                </div>

                <!-- Live Total Summary -->
                <div class="summary-box" style="background: var(--bg-soft); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--primary);">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; color: var(--text-muted);">Calculated Total Value:</span>
                        <span id="liveTotal" style="font-size: 1.4em; font-weight: 700; color: var(--primary);">৳0.00</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="keywords">Keywords / Notes</label>
                    <textarea id="keywords" rows="3" placeholder="Add searchable tags or notes..."></textarea>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%; padding: 12px; font-size: 1.1em;">
                    🚀 Save Product to Inventory
                </button>
            </form>
        </div></main>
<script src="js/auth.js"></script><script src="config.js"></script><script src="js/api.js"></script><script src="js/form.js"></script></body></html>
